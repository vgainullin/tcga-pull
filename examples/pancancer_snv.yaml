# tcga-pull cohort spec — Pancancer somatic SNV MAFs from the GDC.
#
# Open-access matched tumor-normal somatic mutation calls (Aliquot Ensemble
# Masked workflow) across every GDC project that publishes this data shape.
# 55 projects, ~19,552 cases, ~21,300 MAF files, ~4.1 M variant rows.
#
# Reproduce end-to-end with one command:
#
#     tcga-pull pull examples/pancancer_snv.yaml
#
# `pull` honours the `recipes:` section below and runs them after the
# download finishes, so the final cohort dir holds clinical.parquet,
# manifest.parquet, variants.parquet, samples.parquet,
# gene_frequency.parquet, and variant_frequency.parquet — the full set.
#
# `out_dir` is intentionally omitted — the default `./cohorts` is fine, and
# omitting it keeps the spec portable across machines.

name: pancancer_snv

filters:
  data_category: Simple Nucleotide Variation
  data_format: MAF
  project:
    # TCGA — 33 projects
    - TCGA-ACC
    - TCGA-BLCA
    - TCGA-BRCA
    - TCGA-CESC
    - TCGA-CHOL
    - TCGA-COAD
    - TCGA-DLBC
    - TCGA-ESCA
    - TCGA-GBM
    - TCGA-HNSC
    - TCGA-KICH
    - TCGA-KIRC
    - TCGA-KIRP
    - TCGA-LAML
    - TCGA-LGG
    - TCGA-LIHC
    - TCGA-LUAD
    - TCGA-LUSC
    - TCGA-MESO
    - TCGA-OV
    - TCGA-PAAD
    - TCGA-PCPG
    - TCGA-PRAD
    - TCGA-READ
    - TCGA-SARC
    - TCGA-SKCM
    - TCGA-STAD
    - TCGA-TGCT
    - TCGA-THCA
    - TCGA-THYM
    - TCGA-UCEC
    - TCGA-UCS
    - TCGA-UVM
    # TARGET — pediatric
    - TARGET-AML
    - TARGET-ALL-P2
    - TARGET-ALL-P3
    - TARGET-NBL
    - TARGET-OS
    - TARGET-WT
    # CPTAC — proteogenomic
    - CPTAC-2
    - CPTAC-3
    # other programs
    - MMRF-COMMPASS
    - ALCHEMIST-ALCH
    - MP2PRT-ALL
    - HCMI-CMDC
    - BEATAML1.0-COHORT
    - CMI-MBC
    - CMI-MPC
    - CMI-ASC
    - CGCI-HTMCP-CC
    - CGCI-BLGSP
    - RC-PTCL
    - CDDP_EAGLE-1
    - EXCEPTIONAL_RESPONDERS-ER
    - CCG-CUPP

download:
  n_processes: 4

# Post-processing recipes that run after the pull completes.
# Order matters: samples depends on variants; frequency depends on both.
recipes:
  - variants
  - samples
  - frequency

# Optional patient-level omics that can be pulled as separate cohorts and
# merged downstream by case_id / submitter_id. They inherit the project list
# above unless an entry declares its own `project` filter.
#
# Preview one:
#
#     tcga-pull preview examples/pancancer_snv.yaml --omics rna_gene_expression_star_counts
#
# Pull one:
#
#     tcga-pull pull examples/pancancer_snv.yaml --omics rna_gene_expression_star_counts
optional_omics:
  - name: rna_gene_expression_star_counts
    notes: GDC harmonized gene-level RNA-seq counts; 17,212/19,552 SNV cases overlapped in the metadata check.
    recipes:
      - rna_expression
    filters:
      data_category: Transcriptome Profiling
      data_type: Gene Expression Quantification
      experimental_strategy: RNA-Seq
      workflow: STAR - Counts

  - name: gene_level_copy_number
    notes: Gene-level CNV scores; 15,108/19,552 SNV cases overlapped in the metadata check.
    recipes:
      - copy_number
    filters:
      data_category: Copy Number Variation
      data_type: Gene Level Copy Number

  - name: copy_number_segments
    notes: Unmasked or legacy segment-level CNV; 14,678/19,552 SNV cases overlapped in the metadata check.
    recipes:
      - copy_number
    filters:
      data_category: Copy Number Variation
      data_type: Copy Number Segment

  - name: mirna_expression
    notes: Patient-level miRNA abundance; 13,689/19,552 SNV cases overlapped in the metadata check.
    recipes:
      - mirna_expression
    filters:
      data_category: Transcriptome Profiling
      data_type: miRNA Expression Quantification
      experimental_strategy: miRNA-Seq

  - name: dna_methylation_beta
    notes: DNA methylation beta values; 12,724/19,552 SNV cases overlapped in the metadata check.
    recipes:
      - methylation
    filters:
      data_category: DNA Methylation
      data_type: Methylation Beta Value

  - name: masked_copy_number_segments
    notes: Masked segment-level CNV; 10,104/19,552 SNV cases overlapped in the metadata check.
    recipes:
      - copy_number
    filters:
      data_category: Copy Number Variation
      data_type: Masked Copy Number Segment

  - name: protein_expression_rppa
    notes: TCGA RPPA protein expression; 7,233/19,552 SNV cases overlapped in the metadata check.
    recipes:
      - protein_expression
    filters:
      data_category: Proteome Profiling
      data_type: Protein Expression Quantification
      experimental_strategy: Reverse Phase Protein Array
