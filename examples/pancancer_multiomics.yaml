# tcga-pull cohort spec — Pancancer SNV + matched open-access omics.
#
# This config downloads the whole multi-omics file set in one cohort:
# somatic SNV MAFs plus RNA, miRNA, methylation, copy-number, and RPPA files.
#
# This runs the SNV processors plus the multiomics processors. Frequency tables
# are intentionally not enabled here because their denominators should usually
# come from the SNV cohort, not the broader any-omics case set.
#
# Preview:
#
#     tcga-pull preview examples/pancancer_multiomics.yaml
#
# Pull:
#
#     tcga-pull pull examples/pancancer_multiomics.yaml

name: pancancer_multiomics

filters:
  project: &pancancer_projects
    # TCGA — 33 projects
    - TCGA-ACC
    - TCGA-BLCA
    - TCGA-BRCA
    - TCGA-CESC
    - TCGA-CHOL
    - TCGA-COAD
    - TCGA-DLBC
    - TCGA-ESCA
    - TCGA-GBM
    - TCGA-HNSC
    - TCGA-KICH
    - TCGA-KIRC
    - TCGA-KIRP
    - TCGA-LAML
    - TCGA-LGG
    - TCGA-LIHC
    - TCGA-LUAD
    - TCGA-LUSC
    - TCGA-MESO
    - TCGA-OV
    - TCGA-PAAD
    - TCGA-PCPG
    - TCGA-PRAD
    - TCGA-READ
    - TCGA-SARC
    - TCGA-SKCM
    - TCGA-STAD
    - TCGA-TGCT
    - TCGA-THCA
    - TCGA-THYM
    - TCGA-UCEC
    - TCGA-UCS
    - TCGA-UVM
    # TARGET — pediatric
    - TARGET-AML
    - TARGET-ALL-P2
    - TARGET-ALL-P3
    - TARGET-NBL
    - TARGET-OS
    - TARGET-WT
    # CPTAC — proteogenomic
    - CPTAC-2
    - CPTAC-3
    # other programs
    - MMRF-COMMPASS
    - ALCHEMIST-ALCH
    - MP2PRT-ALL
    - HCMI-CMDC
    - BEATAML1.0-COHORT
    - CMI-MBC
    - CMI-MPC
    - CMI-ASC
    - CGCI-HTMCP-CC
    - CGCI-BLGSP
    - RC-PTCL
    - CDDP_EAGLE-1
    - EXCEPTIONAL_RESPONDERS-ER
    - CCG-CUPP

download:
  n_processes: 4

recipes:
  - variants
  - samples
  - multiomics

gdc_filter:
  op: and
  content:
    - op: in
      content:
        field: cases.project.project_id
        value: *pancancer_projects

    - op: or
      content:
        # Somatic SNV MAFs.
        - op: and
          content:
            - op: in
              content:
                field: data_category
                value:
                  - Simple Nucleotide Variation
            - op: in
              content:
                field: data_format
                value:
                  - MAF

        # RNA gene expression: GDC harmonized STAR counts.
        - op: and
          content:
            - op: in
              content:
                field: data_category
                value:
                  - Transcriptome Profiling
            - op: in
              content:
                field: data_type
                value:
                  - Gene Expression Quantification
            - op: in
              content:
                field: experimental_strategy
                value:
                  - RNA-Seq
            - op: in
              content:
                field: analysis.workflow_type
                value:
                  - STAR - Counts

        # Gene-level copy number.
        - op: and
          content:
            - op: in
              content:
                field: data_category
                value:
                  - Copy Number Variation
            - op: in
              content:
                field: data_type
                value:
                  - Gene Level Copy Number

        # Segment-level copy number.
        - op: and
          content:
            - op: in
              content:
                field: data_category
                value:
                  - Copy Number Variation
            - op: in
              content:
                field: data_type
                value:
                  - Copy Number Segment

        # miRNA expression.
        - op: and
          content:
            - op: in
              content:
                field: data_category
                value:
                  - Transcriptome Profiling
            - op: in
              content:
                field: data_type
                value:
                  - miRNA Expression Quantification
            - op: in
              content:
                field: experimental_strategy
                value:
                  - miRNA-Seq

        # DNA methylation beta values.
        - op: and
          content:
            - op: in
              content:
                field: data_category
                value:
                  - DNA Methylation
            - op: in
              content:
                field: data_type
                value:
                  - Methylation Beta Value

        # Masked segment-level copy number.
        - op: and
          content:
            - op: in
              content:
                field: data_category
                value:
                  - Copy Number Variation
            - op: in
              content:
                field: data_type
                value:
                  - Masked Copy Number Segment

        # TCGA RPPA protein expression.
        - op: and
          content:
            - op: in
              content:
                field: data_category
                value:
                  - Proteome Profiling
            - op: in
              content:
                field: data_type
                value:
                  - Protein Expression Quantification
            - op: in
              content:
                field: experimental_strategy
                value:
                  - Reverse Phase Protein Array
