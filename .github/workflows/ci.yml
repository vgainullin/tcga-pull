name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --extra agent
      - name: ruff check
        run: uv run ruff check --output-format=github
      - name: ruff format --check
        run: uv run ruff format --check
      - name: mypy
        run: uv run mypy

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python: ["3.10", "3.11", "3.12", "3.13"]
        include:
          - os: macos-latest
            python: "3.13"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Pin Python ${{ matrix.python }}
        run: echo "${{ matrix.python }}" > .python-version
      - run: uv sync --extra agent
      - name: pytest (offline only)
        run: uv run pytest -m "not network and not download"
